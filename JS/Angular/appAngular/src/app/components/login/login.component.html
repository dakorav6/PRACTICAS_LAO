<div class="login-page vh-100 d-flex align-items-center justify-content-center">
  <div class="login-card p-5">
    <!-- Avatar Neón -->
    <div class="avatar-circle mb-4">
      <span class="material-icons">person</span>
    </div>

    <div class="login-header text-center mb-5">
      <h2>Bienvenido a Yutita Solutions</h2>
    </div>

    <form (ngSubmit)="onLogin()">
      <div class="mb-3">
        <label for="username" class="form-label">Nombre de Usuario</label>
        <input type="text" class="form-control glass-input" id="username" name="username" [(ngModel)]="username" placeholder="Tu usuario o email">
      </div>
      <div class="mb-4">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" class="form-control glass-input" id="password" name="password" [(ngModel)]="password" placeholder="••••••••">
      </div>
      <button type="submit" class="btn neon-btn w-100 py-3">Iniciar Sesión</button>
    </form>
  </div>
</div>
